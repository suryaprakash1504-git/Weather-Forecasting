<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Forecast App</title>
  <link rel="stylesheet" href="Weather.css" />
</head>
<body>
  <main class="app">
    <header>
      <div>
        <p class="tag">WEATHER FORECAST</p>
        <h1>Weather App</h1>
      </div>

      <form id="search-form" class="search-box">
        <input
          id="city-input"
          type="text"
          placeholder="Search city..."
          autocomplete="off"
          required
        />
        <button type="submit">Search</button>
      </form>
    </header>

    <p id="message" class="message"></p>

    <section id="weather-content" class="hidden">
      <section class="current-weather">
        <div class="location-info">
          <p id="date"></p>
          <h2 id="city-name">City Name</h2>
          <p id="condition">Clear sky</p>
        </div>

        <div class="temperature-info">
          <span id="weather-icon" class="main-icon">☀️</span>
          <div>
            <h2><span id="temperature">0</span>°C</h2>
            <p>Feels like <span id="feels-like">0</span>°C</p>
          </div>
        </div>
      </section>

      <section class="details-grid">
        <article class="detail-card">
          <span>💧</span>
          <div>
            <p>Humidity</p>
            <h3 id="humidity">0%</h3>
          </div>
        </article>

        <article class="detail-card">
          <span>💨</span>
          <div>
            <p>Wind Speed</p>
            <h3 id="wind-speed">0 km/h</h3>
          </div>
        </article>

        <article class="detail-card">
          <span>🌧️</span>
          <div>
            <p>Rain Chance</p>
            <h3 id="rain-chance">0%</h3>
          </div>
        </article>

        <article class="detail-card">
          <span>🌅</span>
          <div>
            <p>Sunrise</p>
            <h3 id="sunrise">--:--</h3>
          </div>
        </article>
      </section>

      <section class="forecast-section">
        <h2>5-Day Forecast</h2>
        <div id="forecast-list" class="forecast-list"></div>
      </section>
    </section>
  </main>

  <script src="Weather.js"></script>
</body>
</html>
